<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MochiFocus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/theme.js"></script>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar" role="navigation" aria-label="Navigasi utama">
      <div class="navbar__brand">MochiFocus</div>
      <ul class="navbar__links" role="list">
        <li>
          <a
            href="index.html"
            class="navbar__link navbar__link--active"
            aria-current="page"
            >Dashboard</a
          >
        </li>
        <li><a href="stats.html" class="navbar__link">Stats</a></li>
        <li><a href="calendar.html" class="navbar__link">Calendar</a></li>
        <li><a href="settings.html" class="navbar__link">Settings</a></li>
      </ul>
      <div class="navbar__actions">
        <button
          class="navbar__icon-btn"
          id="navbar-darkmode-btn"
          aria-pressed="false"
          title="Mode gelap"
          aria-label="Toggle mode gelap"
        >
          <svg
            class="icon-moon"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            aria-hidden="true"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <svg
            class="icon-sun"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            aria-hidden="true"
            style="display: none"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
        <button class="navbar__icon-btn" aria-label="Notifikasi">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
        </button>
        <button class="navbar__avatar" aria-label="Profil pengguna"></button>
      </div>
    </nav>

    <!-- DECORATIVE BG BLOBS -->
    <div class="bg-blob bg-blob--green" aria-hidden="true"></div>
    <div class="bg-blob bg-blob--pink" aria-hidden="true"></div>

    <!-- HEADER: Greeting, Date, Time -->
    <header class="header">
      <div class="header__deco header__deco--tl" aria-hidden="true">✦</div>
      <h1 class="header__greeting" id="greeting">Selamat Pagi ✨</h1>
      <p class="header__datetime">
        <span id="current-date"></span>
        <span class="header__sep">•</span>
        <span id="current-time"></span>
      </p>
      <div class="header__deco header__deco--tr" aria-hidden="true">🤍</div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main">
      <!-- LEFT: Focus Timer -->
      <section class="card card--timer" aria-labelledby="timer-heading">
        <h2 id="timer-heading" class="card__label">FOKUS TIMER</h2>

        <!-- SVG circular progress ring -->
        <div
          class="timer__ring-wrapper"
          role="img"
          aria-label="Timer lingkaran"
        >
          <svg class="timer__svg" viewBox="0 0 220 220" aria-hidden="true">
            <!-- Background track -->
            <circle class="timer__track" cx="110" cy="110" r="95" />
            <!-- Progress arc -->
            <circle
              class="timer__progress"
              id="timer-ring"
              cx="110"
              cy="110"
              r="95"
            />
            <!-- Animated pulse dot when running -->
            <g id="timer-pulse-group" class="timer__pulse-group">
              <circle
                class="timer__pulse"
                id="timer-pulse"
                cx="110"
                cy="15"
                r="6.5"
              />
            </g>
          </svg>
          <div class="timer__center">
            <div class="timer__display" id="timer-display" aria-live="polite">
              25:00
            </div>
            <span class="timer__label-text">FOKUS</span>
          </div>
        </div>

        <!-- Minutes input -->
        <div class="timer__mins-row">
          <label class="timer__mins-label" for="timer-minutes-input"
            >Durasi Fokus</label
          >
          <div class="timer__mins-field">
            <input
              class="timer__mins-input"
              type="number"
              id="timer-minutes-input"
              min="1"
              max="120"
              value="25"
              aria-label="Durasi fokus dalam menit"
            />
            <span class="timer__mins-unit">menit</span>
          </div>
        </div>

        <div class="timer__controls">
          <button
            class="btn btn--start"
            id="timer-start"
            aria-label="Mulai timer"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <polygon points="5,3 19,12 5,21" />
            </svg>
            Mulai
          </button>
          <button
            class="btn btn--pause"
            id="timer-pause"
            disabled
            aria-label="Jeda timer"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <rect x="6" y="4" width="4" height="16" />
              <rect x="14" y="4" width="4" height="16" />
            </svg>
            Jeda
          </button>
          <button
            class="btn btn--reset"
            id="timer-reset"
            aria-label="Reset timer"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              aria-hidden="true"
            >
              <polyline points="1 4 1 10 7 10" />
              <path d="M3.51 15a9 9 0 1 0 .49-3.5" />
            </svg>
            Reset
          </button>
        </div>
      </section>

      <!-- RIGHT: To-Do List -->
      <section class="card card--todo" aria-labelledby="todo-heading">
        <div class="card__header-row">
          <h2 id="todo-heading" class="card__label">DAFTAR TUGAS</h2>
          <span class="todo__count-badge" id="todo-count">0 TUGAS</span>
        </div>

        <form class="todo__form" id="todo-form" aria-label="Tambah tugas baru">
          <input
            class="input"
            type="text"
            id="todo-input"
            placeholder="Tambah tugas baru..."
            aria-label="Deskripsi tugas"
            autocomplete="off"
          />
          <button class="btn btn--add-todo" type="submit">Tambah</button>
        </form>

        <ul class="todo__list" id="todo-list" aria-label="Daftar tugas"></ul>
      </section>
    </main>

    <!-- BOTTOM: Quick Links -->
    <section class="card card--links" aria-labelledby="links-heading">
      <h2 id="links-heading" class="card__label">TAUTAN CEPAT</h2>

      <form class="links__form" id="links-form" aria-label="Tambah tautan baru">
        <div class="links__field-group">
          <label class="links__field-label" for="link-title-input"
            >NAMA SITUS</label
          >
          <input
            class="input"
            type="text"
            id="link-title-input"
            placeholder="Contoh: GitHub"
            aria-label="Nama situs"
            autocomplete="off"
          />
        </div>
        <div class="links__field-group">
          <label class="links__field-label" for="link-url-input">URL</label>
          <input
            class="input"
            type="url"
            id="link-url-input"
            placeholder="https://..."
            aria-label="URL situs"
            autocomplete="off"
          />
        </div>
        <button
          class="btn btn--add-link"
          type="submit"
          aria-label="Tambah tautan"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path
              d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"
            />
            <path
              d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"
            />
          </svg>
          Tambah Tautan
        </button>
      </form>

      <div class="links__grid" id="links-grid" aria-label="Tautan cepat"></div>
    </section>

    <script src="js/app.js"></script>
  </body>
</html>
